const SK = 'tna-v5';

function loadData() {
  try {
    const s = localStorage.getItem(SK);
    if (s) return JSON.parse(s);
    // Migrar desde v4
    const old = localStorage.getItem('tna-v4');
    if (old) {
      const d = JSON.parse(old);
      const catNames = [...new Set((d.products||[]).map(p => p.cat).filter(Boolean))];
      return {
        products: d.products,
        suppliers: (d.suppliers||[]).map(s => ({ ...s, wa: s.wa || '' })),
        categories: catNames.map((name, i) => ({ id: i + 1, name }))
      };
    }
  } catch(_) {}
  return null;
}

function saveData(data) {
  try { localStorage.setItem(SK, JSON.stringify(data)); } catch(_) {}
}

function buildMsg(items) {
  const h = new Date().getHours();
  const g = h < 14 ? 'Buenos días' : 'Buenas tardes';
  const lines = items.map(p => `- ${p.orderQty ? p.orderQty + ' ' : ''}${p.name}`).join('\n');
  return `${g},\nPedido Taberna Nuevo Ancla\n\n${lines}\n\nMuchas Gracias`;
}

/* ─── APP ─── */
function App() {
  const [products, setProducts] = useState(() => {
    const saved = loadData();
    if (saved && saved.products) {
      const map = Object.fromEntries(saved.products.map(p => [p.id, p]));
      const base = INITIAL_PRODUCTS.map(p =>
        map[p.id]
          ? { ...p, name: map[p.id].name || p.name, cat: map[p.id].cat || '', sup: map[p.id].sup || '', status: map[p.id].status, orderQty: map[p.id].orderQty || '' }
          : { ...p, cat: '', sup: '', status: null, orderQty: '' }
      );
      const extra = saved.products.filter(p => !INITIAL_PRODUCTS.find(i => i.id === p.id));
      return [...base, ...extra];
    }
    return INITIAL_PRODUCTS.map(p => ({ ...p, cat: '', sup: '', status: null, orderQty: '' }));
  });

  const [suppliers, setSuppliers] = useState(() => {
    const saved = loadData();
    return saved && saved.suppliers ? saved.suppliers.map(s => ({ ...s, wa: s.wa || '' })) : [];
  });

  const [categories, setCategories] = useState(() => {
    const saved = loadData();
    const base = saved && saved.categories ? saved.categories : [];
    // Sincronizar categorías de productos que no estén en la lista
    const prods = (saved && saved.products) ? saved.products : [];
    const prodCats = [...new Set(prods.map(p => p.cat).filter(Boolean))];
    const merged = [...base];
    prodCats.forEach(name => {
      if (!merged.find(c => c.name === name))
        merged.push({ id: Date.now() + merged.length, name });
    });
    return merged;
  });

  const [view, setView]           = useState('list');
  const [search, setSearch]       = useState('');
  const [filterCat, setFilterCat] = useState('');
  const [filterSup, setFilterSup] = useState('');
  const [showAdd, setShowAdd]     = useState(false);
  const [newProd, setNewProd]     = useState({ name: '', cat: '', sup: '' });
  const scrollPos                 = useRef(0);  // guarda posición al salir del inventario

  const switchView = useCallback((id) => {
    if (id === 'list') {
      setView('list');
      requestAnimationFrame(() => window.scrollTo(0, scrollPos.current));
    } else {
      if (view === 'list') scrollPos.current = window.scrollY;
      window.scrollTo(0, 0);
      setView(id);
    }
  }, [view]);

  useEffect(() => { saveData({ products, suppliers, categories }); }, [products, suppliers, categories]);

  const allCats = useMemo(() => {
    const fromCats = categories.map(c => c.name);
    const fromProds = products.map(p => p.cat).filter(Boolean);
    return [...new Set([...fromCats, ...fromProds])].sort();
  }, [products, categories]);

  const supNames = useMemo(() => suppliers.map(s => s.name), [suppliers]);

  const filtered = useMemo(() => {
    let list = products;
    if (search) { const q = search.toLowerCase(); list = list.filter(p => p.name.toLowerCase().includes(q)); }
    if (filterCat) list = list.filter(p => p.cat === filterCat);
    if (filterSup) list = list.filter(p => p.sup === filterSup);
    return list;
  }, [products, search, filterCat, filterSup]);

  const orderItems = useMemo(() => products.filter(p => p.status === 'comprar'), [products]);

  const bySupplier = useMemo(() => {
    const g = {};
    orderItems.forEach(p => { const k = p.sup || 'Sin proveedor'; if (!g[k]) g[k] = []; g[k].push(p); });
    return g;
  }, [orderItems]);

  const reviewed = products.filter(p => p.status !== null).length;
  const progress = products.length > 0 ? (reviewed / products.length) * 100 : 0;

  /* ── Product actions ── */
  const setStatus = useCallback((id, s0) => {
    setProducts(prev => prev.map(p => {
      if (p.id !== id) return p;
      const s = p.status === s0 ? null : s0;
      return { ...p, status: s, orderQty: s !== 'comprar' ? '' : p.orderQty };
    }));
  }, []);

  const updateProduct = useCallback((id, patch) => {
    setProducts(prev => prev.map(p => p.id === id ? { ...p, ...patch } : p));
  }, []);

  // Llamado solo al salir del campo (blur), no en cada tecla
  const commitCat = useCallback((val) => {
    const n = val.trim();
    if (!n) return;
    setCategories(prev => prev.find(c => c.name === n) ? prev : [...prev, { id: Date.now(), name: n }]);
  }, []);

  const commitSup = useCallback((val) => {
    const n = val.trim();
    if (!n) return;
    setSuppliers(prev => prev.find(s => s.name === n) ? prev : [...prev, { id: Date.now(), name: n, wa: '' }]);
  }, []);

  const deleteProduct = useCallback((id) => {
    setProducts(prev => prev.filter(p => p.id !== id));
  }, []);

  const addProduct = () => {
    if (!newProd.name.trim()) return;
    const ts = Date.now();
    if (newProd.sup.trim() && !suppliers.find(s => s.name === newProd.sup.trim()))
      setSuppliers(prev => [...prev, { id: ts, name: newProd.sup.trim(), wa: '' }]);
    if (newProd.cat.trim() && !categories.find(c => c.name === newProd.cat.trim()))
      setCategories(prev => [...prev, { id: ts + 1, name: newProd.cat.trim() }]);
    setProducts(prev => [...prev, { id: ts + 2, name: newProd.name.trim(), cat: newProd.cat.trim(), sup: newProd.sup.trim(), status: null, orderQty: '' }]);
    setNewProd({ name: '', cat: '', sup: '' });
    setShowAdd(false);
  };

  const resetAll = () => {
    if (window.confirm('¿Reiniciar todos los estados del inventario?'))
      setProducts(prev => prev.map(p => ({ ...p, status: null, orderQty: '' })));
  };

  const clearSupplierOrder = useCallback((supName) => {
    setProducts(prev => prev.map(p =>
      (p.sup === supName || (supName === 'Sin proveedor' && !p.sup)) && p.status === 'comprar'
        ? { ...p, status: null, orderQty: '' }
        : p
    ));
  }, []);

  /* ── Supplier actions ── */
  const addSupplier = useCallback((name, wa) => {
    const n = name.trim();
    if (!n || suppliers.find(s => s.name === n)) return false;
    setSuppliers(prev => [...prev, { id: Date.now(), name: n, wa: (wa || '').trim() }]);
    return true;
  }, [suppliers]);

  const renameSupplier = useCallback((id, newName, newWa) => {
    const old = suppliers.find(s => s.id === id);
    if (!old || !newName.trim()) return;
    setSuppliers(prev => prev.map(s => s.id === id ? { ...s, name: newName.trim(), wa: (newWa !== undefined ? newWa : s.wa || '').trim() } : s));
    setProducts(prev => prev.map(p => p.sup === old.name ? { ...p, sup: newName.trim() } : p));
  }, [suppliers]);

  const deleteSupplier = useCallback((id) => {
    const sup = suppliers.find(s => s.id === id);
    if (!sup) return;
    if (!window.confirm(`¿Borrar el proveedor "${sup.name}"?\nLos productos asignados quedarán sin proveedor.`)) return;
    setSuppliers(prev => prev.filter(s => s.id !== id));
    setProducts(prev => prev.map(p => p.sup === sup.name ? { ...p, sup: '' } : p));
  }, [suppliers]);

  /* ── Category actions ── */
  const addCategory = useCallback((name) => {
    const n = name.trim();
    if (!n || categories.find(c => c.name === n)) return false;
    setCategories(prev => [...prev, { id: Date.now(), name: n }]);
    return true;
  }, [categories]);

  const renameCategory = useCallback((id, newName) => {
    const old = categories.find(c => c.id === id);
    if (!old || !newName.trim()) return;
    const n = newName.trim();
    setCategories(prev => prev.map(c => c.id === id ? { ...c, name: n } : c));
    setProducts(prev => prev.map(p => p.cat === old.name ? { ...p, cat: n } : p));
  }, [categories]);

  const deleteCategory = useCallback((id) => {
    const cat = categories.find(c => c.id === id);
    if (!cat) return;
    const count = products.filter(p => p.cat === cat.name).length;
    const msg = count > 0
      ? `¿Borrar la categoría "${cat.name}"?\n${count} producto(s) perderán esta categoría.`
      : `¿Borrar la categoría "${cat.name}"?`;
    if (!window.confirm(msg)) return;
    setCategories(prev => prev.filter(c => c.id !== id));
    if (count > 0) setProducts(prev => prev.map(p => p.cat === cat.name ? { ...p, cat: '' } : p));
    if (filterCat === cat.name) setFilterCat('');
  }, [categories, products, filterCat]);

  const TABS = [
    { id: 'list',       label: 'Inventario' },
    { id: 'order',      label: orderItems.length > 0 ? `Pedido · ${orderItems.length}` : 'Pedido' },
    { id: 'suppliers',  label: 'Proveedores' },
    { id: 'categories', label: 'Categorías' },
  ];

  return (
    <div style={{ minHeight: '100vh', background: C.bg, color: C.text, fontFamily: "'DM Sans',system-ui,sans-serif", paddingBottom: '68px' }}>

      {/* HEADER */}
      <header style={{ position: 'sticky', top: 0, zIndex: 30, background: C.bg, borderBottom: `1px solid ${C.divider}`, padding: '14px 18px 12px' }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: reviewed > 0 ? '10px' : '12px' }}>
          <div>
            <div style={{ fontSize: '10px', letterSpacing: '0.2em', color: C.muted, textTransform: 'uppercase', marginBottom: '1px' }}>Taberna</div>
            <div style={{ fontSize: '19px', fontFamily: "'Lora',Georgia,serif", letterSpacing: '-0.01em' }}>Nuevo Ancla</div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
            {view === 'list' && reviewed > 0 && <span style={{ fontSize: '12px', color: C.muted }}>{reviewed}/{products.length}</span>}
            {view === 'list' && (
              <button onClick={() => setShowAdd(true)}
                style={{ width: '36px', height: '36px', borderRadius: '50%', background: C.amberBtn, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '24px', fontWeight: 300, lineHeight: 1, boxShadow: `0 2px 10px ${C.amberBtn}45` }}>+</button>
            )}
          </div>
        </div>
        {view === 'list' && reviewed > 0 && (
          <div style={{ height: '3px', background: C.divider, borderRadius: '3px', marginBottom: '12px', overflow: 'hidden' }}>
            <div style={{ height: '100%', width: `${progress}%`, background: progress === 100 ? C.greenBtn : C.amberBtn, borderRadius: '3px', transition: 'width 0.4s ease' }} />
          </div>
        )}
        {view === 'list' && (
          <div style={{ position: 'relative' }}>
            <svg style={{ position: 'absolute', left: '12px', top: '50%', transform: 'translateY(-50%)', color: C.subtle, pointerEvents: 'none' }} width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Buscar producto..."
              style={{ width: '100%', padding: '10px 36px 10px 38px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: '11px', color: C.text, fontSize: '15px' }} />
            {search && <button onClick={() => setSearch('')} style={{ position: 'absolute', right: '12px', top: '50%', transform: 'translateY(-50%)', color: C.subtle, fontSize: '20px' }}>×</button>}
          </div>
        )}
      </header>

      {/* FILTROS - dos filas separadas */}
      {view === 'list' && allCats.length > 0 && (
        <div style={{ display: 'flex', gap: '7px', padding: '7px 18px 0', overflowX: 'auto', borderBottom: supNames.length > 0 ? 'none' : `1px solid ${C.divider}` }}>
          {allCats.map(c => (
            <button key={c} onClick={() => setFilterCat(filterCat === c ? '' : c)}
              style={{ padding: '5px 13px', borderRadius: '20px', fontSize: '12px', whiteSpace: 'nowrap', background: filterCat === c ? C.amberBg : C.surface, color: filterCat === c ? C.amber : C.muted, border: `1.5px solid ${filterCat === c ? C.amberBorder : C.border}`, fontWeight: filterCat === c ? 600 : 400, flexShrink: 0 }}>{c}</button>
          ))}
        </div>
      )}
      {view === 'list' && supNames.length > 0 && (

          ))}
        </div>
      )}

      {/* CONTENIDO */}
      <main style={{ padding: '10px 16px 24px' }}>

        )}

        {view === 'suppliers' && <ProveedoresView suppliers={suppliers} products={products} onAdd={addSupplier} onRename={renameSupplier} onDelete={deleteSupplier} />}
        {view === 'categories' && <CategoriasView categories={categories} products={products} onAdd={addCategory} onRename={renameCategory} onDelete={deleteCategory} />}
      </main>

      <nav style={{ position: 'fixed', bottom: 0, left: 0, right: 0, zIndex: 30, background: C.surface, borderTop: `1px solid ${C.divider}`, display: 'flex' }}>

            style={{ flex: 1, padding: '13px 3px 15px', fontSize: '11px', fontWeight: view === tab.id ? 600 : 400, color: view === tab.id ? C.amberMid : C.muted, borderTop: `2px solid ${view === tab.id ? C.amberBtn : 'transparent'}`, transition: 'all 0.15s' }}>

        ))}

      {showAdd && (
        <AddProductModal value={newProd} onChange={setNewProd} allCats={allCats} supNames={supNames}
          onConfirm={addProduct} onClose={() => { setShowAdd(false); setNewProd({ name: '', cat: '', sup: '' }); }} />
      )}
    </div>
  );
}

/* ─── PRODUCT CARD ─── */

                {p.sup && <span style={{ fontSize: '11px', padding: '2px 9px', borderRadius: '20px', background: C.blueBg, color: C.blue, border: `1px solid ${C.blueBorder}`, fontWeight: 500 }}>{p.sup}</span>}

            style={{ flex: 1, padding: '10px 0', borderRadius: '9px', fontSize: '13px', fontWeight: p.status === 'hay' ? 600 : 400, background: p.status === 'hay' ? C.greenBg : C.surface, color: p.status === 'hay' ? C.green : C.muted, border: `1.5px solid ${p.status === 'hay' ? C.greenBorder : C.border}`, transition: 'all 0.15s' }}>Hay</button>

              <button onClick={() => onStatus(p.id, 'comprar')}
                style={{ flex: '0 0 auto', padding: '10px 14px', background: 'transparent', color: C.amber, fontSize: '13px', fontWeight: 600, borderRight: `1px solid ${C.amberBorder}` }}>Pedir</button>
              <input

                style={{ flex: 1, minWidth: 0, padding: '10px 10px', background: 'transparent', border: 'none', color: C.amber, fontSize: '14px', fontWeight: 700, textAlign: 'center', outline: 'none' }}

          <div style={{ marginTop: '9px' }}>

          <div style={{ marginTop: '9px', marginBottom: '4px' }}>
            <DropdownInput label="Proveedor" value={p.sup} options={supNames} placeholder="Elegir o crear proveedor..." onChange={v => onUpdate(p.id, { sup: v })} onCommit={onCommitSup} />

/* ─── SMART INPUT (solo para campos sin lista) ─── */
function SmartInput({ label, value, options, listId, placeholder, onChange, inputRef: extRef, large }) {
  const intRef = useRef(null);
  const ref = extRef || intRef;
  return (
    <div>
      <div style={{ fontSize: '10px', color: C.muted, marginBottom: '5px', textTransform: 'uppercase', letterSpacing: '0.12em', fontWeight: 600 }}>{label}</div>

        style={{ width: '100%', padding: large ? '11px 13px' : '9px 11px', background: C.surface, border: `1px solid ${C.border}`, borderRadius: '9px', color: C.text, fontSize: large ? '15px' : '14px' }} />
      {listId && options && options.length > 0 && <datalist id={listId}>{options.map(o => <option key={o} value={o} />)}</datalist>}
    </div>
  );
}

/* ─── DROPDOWN INPUT (categorías y proveedores con lista desplegable) ─── */
function DropdownInput({ label, value, options, placeholder, onChange, onCommit, large }) {
  const [open, setOpen] = useState(false);
  const blurTimer       = useRef(null);
  const inputRef        = useRef(null);
  const touchStartY     = useRef(null);

  const filtered = options.length === 0 ? [] :
    value.trim() ? options.filter(o => o.toLowerCase().includes(value.toLowerCase())) : options;

  const select = (opt) => {
    clearTimeout(blurTimer.current);
    onChange(opt);
    if (onCommit) onCommit(opt);
    setOpen(false);
  };

  const handleFocus = () => { clearTimeout(blurTimer.current); setOpen(true); };
  const handleBlur  = () => {
    blurTimer.current = setTimeout(() => {
      setOpen(false);
      if (onCommit && value.trim()) onCommit(value.trim());
    }, 200);
  };

  const toggleOpen = (e) => { e.preventDefault(); inputRef.current?.focus(); setOpen(o => !o); };

  const itemTouchStart = (e) => { touchStartY.current = e.touches[0].clientY; };
  const itemTouchEnd   = (e, opt) => {
    const dy = Math.abs(e.changedTouches[0].clientY - (touchStartY.current ?? e.changedTouches[0].clientY));
    if (dy < 8) { e.preventDefault(); select(opt); }
  };

  const isNewValue = value.trim() && !options.find(o => o.toLowerCase() === value.trim().toLowerCase());
  const showList   = open && (filtered.length > 0 || isNewValue);
  const pad        = large ? '11px 34px 11px 13px' : '9px 30px 9px 11px';
  const fs         = large ? '15px' : '14px';

  return (
    <div>
      <div style={{ fontSize: '10px', color: C.muted, marginBottom: '5px', textTransform: 'uppercase', letterSpacing: '0.12em', fontWeight: 600 }}>{label}</div>
      <div style={{ position: 'relative' }}>
        <input
          ref={inputRef}
          type="text"
          value={value}
          onChange={e => { onChange(e.target.value); setOpen(true); }}
          onFocus={handleFocus}
          onBlur={handleBlur}
          placeholder={placeholder}
          style={{ width: '100%', padding: pad, background: C.surface, border: `1px solid ${showList ? C.amberBorder : (open ? C.amberBorder : C.border)}`, borderRadius: showList ? '9px 9px 0 0' : '9px', color: C.text, fontSize: fs, transition: 'border-color 0.15s' }}
        />
        {options.length > 0 && (
          <span
            onMouseDown={toggleOpen}
            onTouchEnd={toggleOpen}
            style={{ position: 'absolute', right: '10px', top: '50%', transform: 'translateY(-50%)', color: open ? C.amberMid : C.subtle, fontSize: '12px', cursor: 'pointer', userSelect: 'none', padding: '6px', lineHeight: 1 }}>▾</span>
        )}
      </div>
      {/* Lista en flujo — no position:absolute, así no la recorta overflow:hidden del card */}
      {showList && (
        <div style={{ background: C.surface, border: `1px solid ${C.amberBorder}`, borderTop: 'none', borderRadius: '0 0 9px 9px', maxHeight: '200px', overflowY: 'auto', WebkitOverflowScrolling: 'touch' }}>
          {filtered.map((opt, i) => (
            <div key={opt}
              onMouseDown={e => { e.preventDefault(); select(opt); }}
              onTouchStart={itemTouchStart}
              onTouchEnd={e => itemTouchEnd(e, opt)}
              style={{ padding: '13px 13px', fontSize: '14px', cursor: 'pointer', background: value === opt ? C.amberBg : 'transparent', color: value === opt ? C.amber : C.text, fontWeight: value === opt ? 600 : 400, borderBottom: (i < filtered.length - 1 || isNewValue) ? `1px solid ${C.divider}` : 'none' }}>
              {opt}
            </div>
          ))}
          {isNewValue && (
            <div
              onMouseDown={e => { e.preventDefault(); select(value.trim()); }}
              onTouchStart={itemTouchStart}
              onTouchEnd={e => itemTouchEnd(e, value.trim())}
              style={{ padding: '13px 13px', fontSize: '13px', cursor: 'pointer', color: C.amberMid, display: 'flex', alignItems: 'center', gap: '6px' }}>
              <span style={{ fontSize: '16px', lineHeight: 1 }}>+</span> Crear "{value.trim()}"
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── PEDIDO VIEW ─── */
function PedidoView({ bySupplier, suppliers, orderCount, onReset, onClearSupplier }) {
  const sups = Object.keys(bySupplier);
  if (sups.length === 0) return (
    <div style={{ textAlign: 'center', padding: '80px 20px' }}>
      <div style={{ width: '40px', height: '2px', background: C.divider, margin: '0 auto 20px' }} />
      <div style={{ color: C.muted, fontSize: '15px', marginBottom: '8px' }}>Sin items para pedir</div>
      <div style={{ color: C.subtle, fontSize: '13px' }}>Marcá productos como Pedir en el inventario</div>
    </div>
  );
  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '14px', padding: '0 2px' }}>
        <div style={{ fontSize: '13px', color: C.muted }}>{orderCount} producto{orderCount !== 1 ? 's' : ''} · {sups.length} proveedor{sups.length !== 1 ? 'es' : ''}</div>
        <button onClick={onReset} style={{ fontSize: '13px', color: C.muted }}>Reiniciar todo</button>
      </div>
      {sups.map(sup => {

      })}
    </>
  );
}

/* ─── SUPPLIER ORDER CARD ─── */
function SupplierOrderCard({ sup, items, waNumber, onClear }) {
  const [showPreview, setShowPreview] = useState(false);
  const [editMsg, setEditMsg]         = useState('');

  const openPreview = () => { setEditMsg(buildMsg(items)); setShowPreview(true); };
  const rows = Math.max(4, editMsg.split('\n').length + 1);

  const sendWa = () => {
    const clean = (waNumber || '').replace(/\D/g, '');
    const url = clean
      ? `https://wa.me/${clean}?text=${encodeURIComponent(editMsg)}`
      : `https://wa.me/?text=${encodeURIComponent(editMsg)}`;
    window.open(url, '_blank');
  };

  const handleClear = () => {
    if (window.confirm(`¿Marcar pedido de "${sup}" como completado?\nSe quitarán ${items.length} producto${items.length !== 1 ? 's' : ''} de la lista.`))
      onClear();
  };

  return (
    <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: '14px', marginBottom: '12px', overflow: 'hidden' }}>
      <div style={{ padding: '13px 16px', borderBottom: `1px solid ${C.divider}` }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: '8px' }}>
          <div>
            <div style={{ fontWeight: 600, fontSize: '15px' }}>{sup}</div>
            <div style={{ fontSize: '12px', color: C.muted, marginTop: '2px', display: 'flex', alignItems: 'center', gap: '6px' }}>
              <span>{items.length} artículo{items.length !== 1 ? 's' : ''}</span>
              {waNumber && <span style={{ color: C.wa, display: 'flex', alignItems: 'center', gap: '3px' }}><WaIcon size={11} /> {waNumber}</span>}
            </div>
          </div>
          <button onClick={openPreview}
            style={{ padding: '9px 16px', borderRadius: '9px', background: C.amberBg, border: `1px solid ${C.amberBorder}`, color: C.amber, fontSize: '13px', fontWeight: 600, flexShrink: 0 }}>Ver pedido</button>
        </div>
        <button onClick={handleClear}
          style={{ width: '100%', padding: '9px', borderRadius: '8px', background: C.greenBg, border: `1px solid ${C.greenBorder}`, color: C.green, fontSize: '13px', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' }}>
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
          Pedido realizado a {sup}
        </button>
      </div>
      <div style={{ padding: '4px 16px 12px' }}>
        {items.map((item, i) => (
          <div key={item.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 0', borderBottom: i < items.length - 1 ? `1px solid ${C.divider}` : 'none', fontSize: '14px' }}>
            <span>{item.name}</span>
            <span style={{ color: item.orderQty ? C.amberMid : C.subtle, fontWeight: item.orderQty ? 600 : 400, minWidth: '36px', textAlign: 'right' }}>{item.orderQty || '—'}</span>
          </div>
        ))}
      </div>
      {showPreview && (
        <div style={{ borderTop: `2px solid ${C.amberBorder}`, background: C.amberBg, padding: '16px' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '10px' }}>
            <div style={{ fontSize: '11px', color: C.amber, textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 600 }}>Editar antes de enviar</div>
            <button onClick={() => setShowPreview(false)} style={{ color: C.subtle, fontSize: '22px', lineHeight: 1 }}>×</button>
          </div>
          <textarea value={editMsg} onChange={e => setEditMsg(e.target.value)} rows={rows}
            style={{ width: '100%', padding: '12px', background: C.surface, border: `1px solid ${C.amberBorder}`, borderRadius: '10px', color: C.text, fontSize: '14px', lineHeight: '1.65' }} />
          <button onClick={sendWa}
            style={{ marginTop: '12px', width: '100%', padding: '13px', background: C.wa, border: 'none', borderRadius: '10px', color: '#fff', fontSize: '14px', fontWeight: 600, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px' }}>
            <WaIcon />
            {waNumber ? `Enviar a ${sup}` : 'Enviar por WhatsApp'}
          </button>
        </div>
      )}
    </div>
  );
}

                  style={{ flex: 2, padding: '10px', borderRadius: '8px', background: C.amberBtn, color: '#fff', fontSize: '13px', fontWeight: 600 }}>Guardar</button>
                <button onClick={() => setEditing(null)}
                  style={{ flex: 1, padding: '10px', borderRadius: '8px', background: C.bg, border: `1px solid ${C.border}`, color: C.muted, fontSize: '13px' }}>Cancelar</button>
              </div>
            </div>
          ) : (
            <div style={{ padding: '13px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div style={{ flex: 1, minWidth: 0, paddingRight: '8px' }}>
                <div style={{ fontWeight: 500, fontSize: '15px' }}>{sup.name}</div>
                <div style={{ fontSize: '12px', color: C.muted, marginTop: '3px', display: 'flex', flexWrap: 'wrap', gap: '8px', alignItems: 'center' }}>
                  <span>{countFor(sup.name)} producto{countFor(sup.name) !== 1 ? 's' : ''}</span>
                  {sup.wa && (
                    <span style={{ color: C.wa, display: 'flex', alignItems: 'center', gap: '3px' }}>
                      <WaIcon size={11} /> {sup.wa}
                    </span>
                  )}
                </div>
              </div>
              <div style={{ display: 'flex', gap: '8px', flexShrink: 0 }}>
                <button onClick={() => setEditing({ id: sup.id, name: sup.name, wa: sup.wa || '' })}
                  style={{ padding: '8px 13px', borderRadius: '8px', background: C.bg, border: `1px solid ${C.border}`, color: C.muted, fontSize: '12px' }}>Editar</button>
                <button onClick={() => onDelete(sup.id)}
                  style={{ padding: '8px 13px', borderRadius: '8px', background: C.dangerBg, border: `1px solid #fecaca`, color: C.danger, fontSize: '12px' }}>Borrar</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </>
  );
}

/* ─── CATEGORIAS VIEW ─── */
function CategoriasView({ categories, products, onAdd, onRename, onDelete }) {
  const [newName, setNewName] = useState('');
  const [editing, setEditing] = useState(null); // { id, name }
  const inputRef = useRef(null);

  const handleAdd = () => {
    if (onAdd(newName)) { setNewName(''); inputRef.current?.blur(); }
  };

  const countFor = name => products.filter(p => p.cat === name).length;

  return (
    <>
      <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: '13px', padding: '16px', marginBottom: '16px' }}>
        <div style={{ fontSize: '11px', fontWeight: 600, color: C.muted, marginBottom: '12px', textTransform: 'uppercase', letterSpacing: '0.1em' }}>Nueva categoría</div>
        <input ref={inputRef} value={newName} onChange={e => setNewName(e.target.value)}
          onKeyDown={e => e.key === 'Enter' && handleAdd()}
          placeholder="Nombre de la categoría..."
          style={{ width: '100%', padding: '11px 13px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: '9px', color: C.text, fontSize: '15px', marginBottom: '8px' }} />
        <button onClick={handleAdd} disabled={!newName.trim()}
          style={{ width: '100%', padding: '12px', borderRadius: '9px', background: newName.trim() ? C.amberBtn : C.divider, color: newName.trim() ? '#fff' : C.subtle, fontSize: '14px', fontWeight: 600 }}>
          Añadir categoría
        </button>
      </div>

      {categories.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '50px 0' }}>
          <div style={{ color: C.muted, fontSize: '14px', marginBottom: '6px' }}>Sin categorías aún</div>
          <div style={{ color: C.subtle, fontSize: '13px' }}>Añadí una arriba para empezar</div>
        </div>
      ) : categories.map(cat => (
        <div key={cat.id} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: '12px', marginBottom: '8px', overflow: 'hidden' }}>
          {editing && editing.id === cat.id ? (
            <div style={{ padding: '13px 14px', display: 'flex', gap: '8px', alignItems: 'center' }}>
              <input autoFocus value={editing.name} onChange={e => setEditing({ ...editing, name: e.target.value })}
                onKeyDown={e => {
                  if (e.key === 'Enter') { onRename(cat.id, editing.name); setEditing(null); }
                  if (e.key === 'Escape') setEditing(null);
                }}
                style={{ flex: 1, padding: '9px 11px', background: C.bg, border: `1px solid ${C.amberBorder}`, borderRadius: '8px', color: C.text, fontSize: '15px', fontWeight: 500 }} />
              <button onClick={() => { onRename(cat.id, editing.name); setEditing(null); }}
                style={{ padding: '9px 14px', borderRadius: '8px', background: C.amberBtn, color: '#fff', fontSize: '13px', fontWeight: 600 }}>OK</button>
              <button onClick={() => setEditing(null)}
                style={{ padding: '9px 12px', borderRadius: '8px', background: C.bg, border: `1px solid ${C.border}`, color: C.muted, fontSize: '13px' }}>×</button>
            </div>
          ) : (
            <div style={{ padding: '13px 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <div style={{ fontWeight: 500, fontSize: '15px' }}>{cat.name}</div>
                <div style={{ fontSize: '12px', color: C.muted, marginTop: '2px' }}>
                  {countFor(cat.name) === 0
                    ? <span style={{ color: C.subtle }}>Sin productos</span>
                    : `${countFor(cat.name)} producto${countFor(cat.name) !== 1 ? 's' : ''}`}
                </div>
              </div>
              <div style={{ display: 'flex', gap: '8px' }}>
                <button onClick={() => setEditing({ id: cat.id, name: cat.name })}
                  style={{ padding: '8px 13px', borderRadius: '8px', background: C.bg, border: `1px solid ${C.border}`, color: C.muted, fontSize: '12px' }}>Editar</button>
                <button onClick={() => onDelete(cat.id)}
                  style={{ padding: '8px 13px', borderRadius: '8px', background: C.dangerBg, border: `1px solid #fecaca`, color: C.danger, fontSize: '12px' }}>Borrar</button>
              </div>
            </div>
          )}
        </div>
      ))}
    </>
  );
}

/* ─── ADD PRODUCT MODAL ─── */
function AddProductModal({ value, onChange, allCats, supNames, onConfirm, onClose }) {
  const nameRef = useRef(null);
  useEffect(() => { setTimeout(() => nameRef.current?.focus(), 120); }, []);
  return (
    <div onClick={e => e.target === e.currentTarget && onClose()}
      style={{ position: 'fixed', inset: 0, zIndex: 50, background: 'rgba(28,24,20,0.55)', display: 'flex', alignItems: 'flex-end' }}>
      <div style={{ width: '100%', background: C.surface, borderRadius: '20px 20px 0 0', padding: '8px 20px 44px', borderTop: `1px solid ${C.divider}` }}>
        <div style={{ width: '36px', height: '4px', background: C.divider, borderRadius: '2px', margin: '12px auto 20px' }} />
        <div style={{ fontWeight: 700, fontSize: '17px', marginBottom: '20px', letterSpacing: '-0.02em' }}>Nuevo producto</div>
        <SmartInput label="Nombre" value={value.name} options={[]} listId="an" placeholder="Nombre del producto" inputRef={nameRef} large onChange={v => onChange({ ...value, name: v })} />
        <div style={{ marginTop: '14px' }}>
          <DropdownInput label="Categoría" value={value.cat} options={allCats} placeholder="Elegir o crear categoría" large onChange={v => onChange({ ...value, cat: v })} />
        </div>
        <div style={{ marginTop: '14px', marginBottom: '24px' }}>
          <DropdownInput label="Proveedor" value={value.sup} options={supNames} placeholder="Elegir o crear proveedor" large onChange={v => onChange({ ...value, sup: v })} />
        </div>
        <div style={{ display: 'flex', gap: '10px' }}>
          <button onClick={onClose} style={{ flex: 1, padding: '14px', background: C.bg, border: `1px solid ${C.border}`, borderRadius: '11px', color: C.muted, fontSize: '15px' }}>Cancelar</button>
          <button onClick={onConfirm} disabled={!value.name.trim()}
            style={{ flex: 2, padding: '14px', background: value.name.trim() ? C.amberBtn : C.divider, border: 'none', borderRadius: '11px', color: value.name.trim() ? '#fff' : C.subtle, fontSize: '15px', fontWeight: 600, transition: 'all 0.15s' }}>
            Agregar producto
          </button>
        </div>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
